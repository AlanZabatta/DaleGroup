<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DaleGroup</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f0f0f0;
      font-family: sans-serif;
    }

    /* Contenedor principal que simula la pantalla */
    .dalegroup-container {
      max-width: 450px;
      margin: 0 auto;
      background-color: white;
     
    /* Barra superior */
    .top-bar {
      margin-bottom: 20px;
    }
    .menu-btn {
      background: white;
      border: 1px solid #333;
      padding: 5px 10px;
      font-size: 18px;
      cursor: pointer;
    }

    /* Área donde se generan los rectángulos (con scroll) */
    .rectangles-scroll-area {
      flex-grow: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
      padding-bottom: 20px;
    }

    /* Los rectángulos (Cupones) */
    .coupon-rectangle {
      width: 100%;
      height: 90px;
      background-color: white;
      border: 1px solid #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .coupon-text {
      font-size: 14px;
      color: #333;
    }

    /* Sección inferior */
    .bottom-actions {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: white;
      padding: 15px;
      border: 1px solid #ddd;
    }

    /* Input de archivo */
    .file-input {
      display: none;
    }
    .upload-label {
      background-color: #f8f9fa;
      border: 1px solid #000;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 14px;
    }

    /* El texto de un solo renglón negro */
    .single-line-black-text {
      background-color: #212529;
      color: #ffffff;
      padding: 10px 12px;
      margin: 0;
      width: 100%;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <div class="dalegroup-container">
    <div class="top-bar">
      <button class="menu-btn">≡</button>
    </div>

    <div class="rectangles-scroll-area" id="contenedor-rectangulos">
    </div>

  </div>

  <script>
    // Este script genera los rectángulos para que funcionen en HTML puro
    const contenedor = document.getElementById('contenedor-rectangulos');
   
    // Cambiá el 50 por la cantidad de rectángulos que quieras
    for (let i = 1; i <= 50; i++) {
      const div = document.createElement('div');
      div.className = 'coupon-rectangle';
     
      // Solo le pone el texto "Cupon" al primer rectángulo
      if (i === 1) {
        div.innerHTML = '<span class="coupon-text">Cupon</span>';
      }
     
      contenedor.appendChild(div);
    }
  </script>

</body>
</html>
