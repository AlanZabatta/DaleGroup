<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DaleGroup - Scroll Infinito</title>
    <link rel="stylesheet" href="categorias.css">
  <style>

    
    /* Reseteo básico y fondo totalmente transparente */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: transparent;
      font-family: sans-serif;
    }

    /* Contenedor principal: Ancho y adaptado para PC */
    .dalegroup-container {
      width: 100%;
      max-width: 1200px; /* En PC se expande hasta 1200px, haciéndolo bien ancho */
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      background-color: transparent; /* Sin fondo */
    }

    /* Área de scroll */
    .rectangles-scroll-area {
      flex-grow: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px; /* Espacio entre los rectángulos */
      padding: 20px;
     
      /* OCULTAR LA BARRA DE SCROLL (el "cosito") */
      -ms-overflow-style: none;  /* Para Internet Explorer y Edge */
      scrollbar-width: none;  /* Para Firefox */
    }
   
    /* Ocultar la barra en Chrome, Safari y Opera */
    .rectangles-scroll-area::-webkit-scrollbar {
      display: none;
    }

    /* Los rectángulos */
    .coupon-rectangle {
      width: 100%;
      height: 140px; /* Bien altos y proporcionados para PC */
      background-color: transparent;
      border: 1px solid #000000; /* Fino y negro */
      border-radius: 12px; /* Bordes redondeados */
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .coupon-text {
      font-size: 16px;
      color: #000;
    }

    /* Sección inferior anclada */
    .bottom-actions {
      padding: 15px 20px;
      background: transparent;
    }

    /* El texto de un solo renglón negro */
    .single-line-black-text {
      background-color: #000000;
      color: #ffffff;
      padding: 15px;
      margin: 0;
      width: 100%;
      text-align: center;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      box-sizing: border-box;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <div class="dalegroup-container">
   
    <div class="rectangles-scroll-area" id="contenedor-rectangulos">
    </div>

  
  </div>

  <script>
    const contenedor = document.getElementById('contenedor-rectangulos');
    let contadorRectangulos = 0;

    // Función que genera una cantidad "X" de rectángulos
    function generarRectangulos(cantidad) {
      for (let i = 0; i < cantidad; i++) {
        contadorRectangulos++;
        const div = document.createElement('div');
        div.className = 'coupon-rectangle';
       
        // Al primero le ponemos el texto "Cupon"
        if (contadorRectangulos === 1) {
          div.innerHTML = '<span class="coupon-text">Cupon</span>';
        }
       
        contenedor.appendChild(div);
      }
    }

    // 1. Generar los primeros 20 rectángulos apenas carga la página
    generarRectangulos(20);

    // 2. Lógica de GENERACIÓN INFINITA PROCEDURAL
    contenedor.addEventListener('scroll', () => {
      // Si scrolleás y te acercás al fondo del contenedor...
      if (contenedor.scrollTop + contenedor.clientHeight >= contenedor.scrollHeight - 150) {
        // ...genera 10 rectángulos más automáticamente de forma invisible
        generarRectangulos(10);
      }
    });
  </script>

</body>
</html>
